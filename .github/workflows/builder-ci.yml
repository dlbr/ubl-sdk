name: Builder CI
on:
  push:
    paths:
      - 'packages/ubl-sdk/**'
      - '.github/workflows/builder-ci.yml'
  pull_request:
    paths:
      - 'packages/ubl-sdk/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ubl-sdk
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'packages/ubl-sdk/pnpm-lock.yaml'

      - name: Install Dependencies
        run: pnpm install

      - name: Run Tests
        run: pnpm test
