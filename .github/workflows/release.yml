name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # Fetch full history so git subtree works
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Diagnose token owner
        run: |
          echo "Token owner:"
          curl -s -H "Authorization: Bearer $UBL_SDK_SYNC_TOKEN" https://api.github.com/user | grep '"login"'
        env:
          UBL_SDK_SYNC_TOKEN: ${{ secrets.UBL_SDK_SYNC_TOKEN }}

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          # Custom publish command that mirrors the code to the public repo
          publish: pnpm run release:sync
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UBL_SDK_SYNC_TOKEN: ${{ secrets.UBL_SDK_SYNC_TOKEN }}
