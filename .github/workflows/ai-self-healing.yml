name: SEF Bridge v4.0.0 — AI Self-Healing Compliance

on:
  repository_dispatch:
    types: [sef_hotfix_detected] # Okidač od strane našeg skrapera (Compliance Watcher)
  workflow_dispatch:
    inputs:
      pdf_url:
        description: 'URL zvaničnog državnog Hotfix PDF-a'
        required: true

jobs:
  ai_patch_and_deploy:
    name: 🧠 AI Patcher & 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Povlačenje koda sa GitHub-a
        uses: actions/checkout@v4

      - name: 🛠️ Podešavanje Node.js okruženja
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 📦 Instalacija zavisnosti (npm)
        run: npm ci

      - name: 📄 Ekstrakcija teksta iz PDF-a i AI analiza
        id: ai_patcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PDF_URL: ${{ github.event.inputs.pdf_url || github.event.client_payload.pdf_url }}
        run: |
          echo "Preuzimanje PDF-a: $PDF_URL"
          node scripts/extract-pdf-text.js "$PDF_URL" > hotfix_text.txt
          
          echo "Pokretanje AI Patcher-a..."
          AI_RESULT=$(node scripts/ai-code-patcher.js hotfix_text.txt)
          echo "$AI_RESULT"
          if [[ "$AI_RESULT" != *"NO_CHANGES"* ]]; then
             echo "patch_applied=true" >> $GITHUB_OUTPUT
          else
             echo "patch_applied=false" >> $GITHUB_OUTPUT
          fi
          
      - name: 🧪 Pokretanje Lokalnog Test Suita (Vitest)
        if: steps.ai_patcher.outputs.patch_applied == 'true'
        run: npm test

      - name: 🛡️ Verifikacija na Državnom Sandbox-u (CI/CD Bedem)
        if: steps.ai_patcher.outputs.patch_applied == 'true'
        env:
          SEF_DEMO_API_KEY: ${{ secrets.STAGING_SEF_API_KEY }}
        run: node scripts/state-sandbox-ping.js

      - name: 🚀 AUTOMATSKI REDEPLOY (Cloudflare Wrangler)
        if: steps.ai_patcher.outputs.patch_applied == 'true' && success()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
