name: Monorepo Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'packages/backend/**'
              - 'packages/shared/**'
            frontend:
              - 'packages/frontend/**'
              - 'packages/shared/**'

  validate:
    name: 🛡️ Verify & Compliance
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⛰️ Instalacija okruženja
        run: |
          apk add --no-cache git nodejs npm
          node -v
          npm -v
          npm install -g pnpm
          pnpm -v
          pnpm config set store-dir ~/.pnpm-store

      - name: 🗄️ Keširanje pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Instalacija i Build
        run: pnpm install --frozen-lockfile

      - name: 🧪 Pokretanje Testova
        env:
          ADMIN_API_KEY: "admin_secret"
          SESSION_SECRET: "test_secret_32_chars_long_ver_2026"
        run: pnpm test

  deploy-backend:
    name: ⚡ Deploy Backend Worker
    needs: [validate, changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⛰️ Instalacija okruženja
        run: |
          apk add --no-cache git nodejs npm
          node -v
          npm -v
          npm install -g pnpm
          pnpm -v
          pnpm config set store-dir ~/.pnpm-store

      - name: 🗄️ Keširanje pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Instalacija
        run: pnpm install --frozen-lockfile

      - name: 🌤️ Deploy Backend (Preview)
        if: github.event_name == 'pull_request'
        run: |
          pnpm --filter @sef/backend deploy --preproduction
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: 🛑 Deploy Backend (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          pnpm --filter @sef/backend deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-frontend:
    name: 🎨 Deploy Nuxt Frontend
    needs: [validate, changes]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⛰️ Instalacija okruženja
        run: |
          apk add --no-cache git nodejs npm
          node -v
          npm -v
          npm install -g pnpm
          pnpm -v
          pnpm config set store-dir ~/.pnpm-store

      - name: 🗄️ Keširanje pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Instalacija
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Nuxt Production Build
        run: pnpm build:frontend
        env:
          NITRO_PRESET: cloudflare-worker

      - name: 🚀 Deploy Frontend (Cloudflare Worker)
        run: |
          pnpm --filter @sef/frontend deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
