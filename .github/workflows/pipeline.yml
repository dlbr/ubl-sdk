name: Monorepo Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: 🛡️ Verify & Compliance
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/dlbr/sef-ci-env:latest
    steps:
      - name: 📥 Checkout repozitorijuma
        uses: actions/checkout@v4

      - name: 📦 Podešavanje pnpm-a
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 📥 Instalacija zavisnosti
        run: npx pnpm install --frozen-lockfile

      - name: 🏗️ Nuxt Prepare
        run: npx pnpm --filter @sef/frontend exec nuxt prepare

      - name: 🧪 Pokretanje Testova
        env:
          ADMIN_API_KEY: "admin_secret"
          SESSION_SECRET: "test_secret_32_chars_long_ver_2026"
        run: npx pnpm test

  deploy-backend:
    name: ⚡ Deploy Backend Worker
    needs: validate
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/dlbr/sef-ci-env:latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout repozitorijuma
        uses: actions/checkout@v4

      - name: 📦 Podešavanje pnpm-a
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 🗄️ Keširanje node_modules
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📥 Instalacija zavisnosti
        run: npx pnpm install --frozen-lockfile

      - name: 🌤️ Deploy Backend (Preview)
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'packages/backend'
          command: deploy --preproduction

      - name: 🛑 Deploy Backend (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'packages/backend'
          command: deploy

  deploy-frontend:
    name: 🎨 Deploy Nuxt Frontend
    needs: deploy-backend
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/dlbr/sef-ci-env:latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout repozitorijuma
        uses: actions/checkout@v4

      - name: 📦 Podešavanje pnpm-a
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 📥 Instalacija zavisnosti
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Nuxt Production Build
        run: pnpm build:frontend
        env:
          NITRO_PRESET: cloudflare-worker

      - name: 🚀 Deploy Frontend (Cloudflare Worker)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'packages/frontend'
          command: deploy
