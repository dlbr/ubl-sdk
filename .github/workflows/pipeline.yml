name: Monorepo Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: 🛡️ Verify & Compliance
    runs-on: ubuntu-latest
    container:
      image: alpine:3.19
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⛰️ Instalacija okruženja (Git, Node.js v22+, pnpm)
        run: |
          apk add --no-cache --repository=https://dl-cdn.alpinelinux.org/alpine/edge/main/ \
                           --repository=https://dl-cdn.alpinelinux.org/alpine/edge/community/ \
                           git nodejs npm
          node -v
          npm -v
          npm install -g pnpm
          pnpm -v

      - name: 🗄️ Keširanje pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Instalacija i Build
        run: |
          pnpm config set store-dir ~/.pnpm-store
          pnpm install --frozen-lockfile

      - name: 🧪 Pokretanje Testova
        env:
          ADMIN_API_KEY: "admin_secret"
          SESSION_SECRET: "test_secret_32_chars_long_ver_2026"
        run: pnpm test

  deploy-backend:
    name: ⚡ Deploy Backend Worker
    needs: validate
    runs-on: ubuntu-latest
    container:
      image: alpine:3.19
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⛰️ Instalacija okruženja (Git, Node.js v22+, pnpm)
        run: |
          apk add --no-cache --repository=https://dl-cdn.alpinelinux.org/alpine/edge/main/ \
                           --repository=https://dl-cdn.alpinelinux.org/alpine/edge/community/ \
                           git nodejs npm
          node -v
          npm -v
          npm install -g pnpm
          pnpm -v

      - name: 🗄️ Keširanje pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Instalacija
        run: |
          pnpm config set store-dir ~/.pnpm-store
          pnpm install --frozen-lockfile

      - name: 🌤️ Deploy Backend (Preview)
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'packages/backend'
          command: deploy --preproduction

      - name: 🛑 Deploy Backend (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'packages/backend'
          command: deploy

  deploy-frontend:
    name: 🎨 Deploy Nuxt Frontend
    needs: deploy-backend
    runs-on: ubuntu-latest
    container:
      image: alpine:3.19
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⛰️ Instalacija okruženja (Git, Node.js v22+, pnpm)
        run: |
          apk add --no-cache --repository=https://dl-cdn.alpinelinux.org/alpine/edge/main/ \
                           --repository=https://dl-cdn.alpinelinux.org/alpine/edge/community/ \
                           git nodejs npm
          node -v
          npm -v
          npm install -g pnpm
          pnpm -v

      - name: 🗄️ Keširanje pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📦 Instalacija
        run: |
          pnpm config set store-dir ~/.pnpm-store
          pnpm install --frozen-lockfile

      - name: 🏗️ Nuxt Production Build
        run: pnpm build:frontend
        env:
          NITRO_PRESET: cloudflare-worker

      - name: 🚀 Deploy Frontend (Cloudflare Worker)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'packages/frontend'
          command: deploy
