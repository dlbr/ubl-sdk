name: 🚀 Titanijumski Štit - Monorepo Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: 🛡️ Verify & Compliance
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repozitorijuma
        uses: actions/checkout@v4

      - name: 🟢 Podešavanje Node.js okruženja
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: 📦 Podešavanje pnpm-a
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 📥 Instalacija zavisnosti
        run: npx pnpm install --frozen-lockfile

      - name: 🏗️ Nuxt Prepare
        run: npx pnpm --filter @sef/frontend exec nuxt prepare

      - name: 🧪 Pokretanje Testova
        env:
          ADMIN_API_KEY: "admin_secret"
          SESSION_SECRET: "test_secret_32_chars_long_ver_2026"
        run: npx pnpm test

  deploy-backend:
    name: ⚡ Deploy Backend Worker
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout repozitorijuma
        uses: actions/checkout@v4

      - name: 🟢 Podešavanje Node.js okruženja
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Podešavanje pnpm-a
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 🗄️ Keširanje node_modules
        uses: actions/cache@v4
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: 📥 Instalacija zavisnosti
        run: npx pnpm install --frozen-lockfile

      - name: 🏗️ Build Shared Paketa
        run: npx pnpm build:shared

      # KORAK A: Ako je kôd na PR-u, šaljemo ga na Preview URL (*-sef-bridge...)
      - name: 🌤️ Deploy Backend (Preview)
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'packages/backend'
          command: deploy --preproduction

      # KORAK B: Ako je kôd spojen u main, šaljemo ga direktno na Production URL
      - name: 🛑 Deploy Backend (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: 'packages/backend'
          command: deploy

  deploy-frontend:
    name: 🎨 Deploy Nuxt Frontend
    needs: deploy-backend # Čekamo backend da završi da bi binding bio dostupan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: 📥 Checkout repozitorijuma
        uses: actions/checkout@v4

      - name: 🟢 Podešavanje Node.js okruženja
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Podešavanje pnpm-a
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate

      - name: 📥 Instalacija zavisnosti
        run: pnpm install --frozen-lockfile

      - name: 🏗️ Nuxt Production Build
        run: pnpm build:frontend
        env:
          NITRO_PRESET: cloudflare-pages

      # Ovde ispaljuješ Nuxt na Cloudflare Pages
      - name: 🚀 Deploy Frontend (Cloudflare Pages)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: 'packages/frontend'
          command: pages deploy .output/public --project-name=sef-bridge-frontend
