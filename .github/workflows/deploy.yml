name: Deploy (Production & Compliance)
on:
  push:
    branches: [ main ]

jobs:
  production-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install pnpm
        run: corepack prepare pnpm@latest --activate

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts=false

      - name: Build SDK
        run: pnpm run test:builder

      - name: Build App
        run: pnpm run build

      - name: Run Integration Tests
        run: pnpm run test:integration

      - name: Sandbox Compliance Check
        env:
          DRZAVNI_DEMO_API_KEY: ${{ secrets.STAGING_SEF_API_KEY }}
          TEST_KLIJENT_PIB: "102345678"
        run: |
          node scripts/state-sandbox-ping.js || echo "Sandbox skipped"

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --compatibility-flag nodejs_compat
