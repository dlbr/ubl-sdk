name: CI
on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install System Deps
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils default-jre git

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build SDK
        run: pnpm run test:builder

      - name: Run Tests
        run: pnpm test
