name = "sef-bridge-backend"
main = "src/index.ts"
compatibility_date = "2026-05-25"
compatibility_flags = ["nodejs_compat"]

[alias]
"@dlbr/ubl-sdk" = "../ubl-sdk/src/index.ts"
"@sef/shared" = "../shared/index.ts"

# 🚀 PRAVILA ZA BINARNE FAJLOVE (WASM i Fontovi)
[[rules]]
type = "Data"
globs = ["**/*.ttf"]
fallthrough = true

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# 🚀 Zvanični Cloudflare Email Sending binding
[[send_email]]
name = "EMAIL"

[[d1_databases]]
binding = "REGISTAR_DB"
database_name = "sef_centralni_registar"
database_id = "189e8330-f1b4-4172-a9b0-27271acb7847"

[durable_objects]
bindings = [
  { name = "KLIJENT_BAZA_OBJECT", class_name = "KlijentBaza" }
]

[[kv_namespaces]]
binding = "PORESKI_KV"
id = "b688022ffcc247d4843b97d70b76b719"

[[r2_buckets]]
binding = "SEF_UBL_ARHIVA"
bucket_name = "prod-sef-ubl-arhiva-10godina"

[[migrations]]
tag = "v1_init_ledger"
new_sqlite_classes = ["KlijentBaza"]

[ai]
binding = "AI"

[[queues.producers]]
binding = "SEF_QUEUE"
queue = "sef-compliance-queue"

[[queues.producers]]
binding = "OTPREMNICA_QUEUE"
queue = "eotpremnice-reconciliation-queue"

[[queues.producers]]
binding = "WEBHOOK_QUEUE"
queue = "sef-webhook-delivery"

[env.production]
name = "sef-bridge-backend"
workers_dev = false

[env.production.durable_objects]
bindings = [
  { name = "KLIJENT_BAZA_OBJECT", class_name = "KlijentBaza" }
]

[[env.production.send_email]]
name = "EMAIL"

[[env.production.d1_databases]]
binding = "REGISTAR_DB"
database_name = "sef_centralni_registar"
database_id = "189e8330-f1b4-4172-a9b0-27271acb7847"

[[env.production.kv_namespaces]]
binding = "PORESKI_KV"
id = "b688022ffcc247d4843b97d70b76b719"

[[env.production.r2_buckets]]
binding = "SEF_UBL_ARHIVA"
bucket_name = "prod-sef-ubl-arhiva-10godina"

[env.production.ai]
binding = "AI"

[[env.production.queues.producers]]
binding = "SEF_QUEUE"
queue = "sef-compliance-queue"

[[env.production.queues.producers]]
binding = "OTPREMNICA_QUEUE"
queue = "eotpremnice-reconciliation-queue"

[[env.production.queues.producers]]
binding = "WEBHOOK_QUEUE"
queue = "sef-webhook-delivery"

[[queues.consumers]]
queue = "sef-compliance-queue"
max_batch_size = 10
max_batch_timeout = 30

[[queues.consumers]]
queue = "eotpremnice-reconciliation-queue"
max_batch_size = 10
max_batch_timeout = 5

[[queues.consumers]]
queue = "sef-webhook-delivery"
max_batch_size = 10
max_batch_timeout = 5
