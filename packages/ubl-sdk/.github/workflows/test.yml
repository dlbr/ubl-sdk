name: Test and Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install

      - name: Run Tests with Coverage
        run: pnpm run test:coverage

      - name: Send Report to Telegram
        if: always()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Ekstrakcija coverage procenta (zahteva instaliran jq)
          # Ako fajl ne postoji, prijavljujemo 0
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE_SUMMARY=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          else
            COVERAGE_SUMMARY="N/A"
          fi
          
          MESSAGE="✅ *Build Status:* ${{ job.status }}%0A📊 *Coverage:* $COVERAGE_SUMMARY%%0A🔗 *Repo:* ${{ github.repository }}%0A👤 *Commit:* ${{ github.event.head_commit.message }}"
          
          curl -s -X POST https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage \
            -d chat_id=$TELEGRAM_CHAT_ID \
            -d text="$MESSAGE" \
            -d parse_mode=Markdown
