name = "sef-bridge"
main = "worker/index.ts"
compatibility_date = "2026-05-15"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "sef.dlbr.cloud"
custom_domain = true

[assets]
directory = ".output/public"
binding = "ASSETS"

[[d1_databases]]
binding = "REGISTAR_DB"
database_name = "sef_centralni_registar"
database_id = "189e8330-f1b4-4172-a9b0-27271acb7847"

[durable_objects]
bindings = [
  { name = "KLIJENT_BAZA_OBJECT", class_name = "KlijentBaza" }
]

[[kv_namespaces]]
binding = "PORESKI_KV"
id = "b688022ffcc247d4843b97d70b76b719"

[[r2_buckets]]
binding = "SEF_UBL_ARHIVA"
bucket_name = "prod-sef-ubl-arhiva-10godina"

[[migrations]]
tag = "v1_init_ledger"
new_sqlite_classes = ["KlijentBaza"]

[observability]
enabled = true

[triggers]
crons = ["0 2 * * *"]

[ai]
binding = "AI"
# remote = true

[[queues.producers]]
binding = "SEF_QUEUE"
queue = "sef-compliance-queue"

[[queues.consumers]]
queue = "sef-compliance-queue"
max_batch_size = 10
max_batch_timeout = 30
